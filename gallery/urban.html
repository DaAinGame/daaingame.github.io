<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Urban — Maclaskey Photo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: rgba(255,255,255,0.07);
      --text: #ffffff;
      --muted: #c8c8d8;
      --accent: #c8a96e;
      --accent-dim: rgba(200, 169, 110, 0.15);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 400;
      letter-spacing: 0.04em;
      overflow-x: hidden;
      min-height: 100vh;
    }

    #starfield {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.5;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 3rem;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(12px);
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--text);
      text-decoration: none;
    }

    .nav-logo span { color: var(--accent); }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    .nav-links a:hover,
    .nav-links a.active { color: var(--accent); }

    .breadcrumb {
      position: relative;
      z-index: 1;
      padding: 8rem 3rem 0;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      animation: fadeUp 0.8s 0.2s ease both;
    }

    .breadcrumb a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.3s;
    }

    .breadcrumb a:hover { color: var(--accent); }
    .breadcrumb span { color: var(--accent); }

    .page-header {
      position: relative;
      z-index: 1;
      padding: 2rem 3rem 3rem;
      max-width: 1200px;
      margin: 0 auto;
      animation: fadeUp 0.8s 0.3s ease both;
    }

    .page-eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      font-weight: 300;
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    .page-title em {
      font-style: italic;
      color: var(--accent);
    }

    .page-sub {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      line-height: 1.8;
    }

    .photo-count {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    .photo-count span { color: var(--accent); }

    .gallery-section {
      position: relative;
      z-index: 1;
      padding: 1rem 3rem 6rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      aspect-ratio: 3/2;
      cursor: pointer;
      background: var(--surface);
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
      display: block;
    }

    .gallery-item:hover img {
      transform: scale(1.05);
    }

    .gallery-item-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      transition: background 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gallery-item:hover .gallery-item-overlay {
      background: rgba(0,0,0,0.3);
    }

    .gallery-item-icon {
      color: white;
      font-size: 1.5rem;
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .gallery-item:hover .gallery-item-icon {
      opacity: 1;
      transform: scale(1);
    }

    .gallery-item-caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1rem;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .gallery-item:hover .gallery-item-caption {
      opacity: 1;
      transform: translateY(0);
    }

    .empty-state {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 6rem 3rem;
      color: var(--muted);
    }

    .empty-state-icon { font-size: 3rem; opacity: 0.2; margin-bottom: 1rem; }
    .empty-state p { font-size: 0.8rem; letter-spacing: 0.15em; }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.96);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .lightbox.active {
      opacity: 1;
      pointer-events: all;
    }

    .lightbox-inner {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .lightbox-img {
      max-width: 90vw;
      max-height: 80vh;
      object-fit: contain;
      transform: scale(0.95);
      transition: transform 0.3s ease;
      border: 1px solid var(--border);
    }

    .lightbox.active .lightbox-img {
      transform: scale(1);
    }

    .lightbox-caption {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-align: center;
      min-height: 1.2em;
    }

    .lightbox-close {
      position: fixed;
      top: 2rem;
      right: 2rem;
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      width: 2.5rem;
      height: 2.5rem;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.3s, color 0.3s;
      z-index: 1001;
    }

    .lightbox-close:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .lightbox-prev,
    .lightbox-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      width: 2.5rem;
      height: 2.5rem;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.3s, color 0.3s;
      z-index: 1001;
    }

    .lightbox-prev { left: 1.5rem; }
    .lightbox-next { right: 1.5rem; }

    .lightbox-prev:hover,
    .lightbox-next:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .lightbox-counter {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .loading {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 6rem;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--border);
      padding: 2.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--muted);
    }

    .footer-logo span { color: var(--accent); }
    .footer-copy { font-size: 0.65rem; letter-spacing: 0.15em; color: var(--muted); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 600px) {
      nav { padding: 1.2rem 1.5rem; }
      .nav-links { gap: 1.5rem; }
      .breadcrumb { padding: 7rem 1.5rem 0; }
      .page-header { padding: 2rem 1.5rem 2rem; }
      .gallery-section { padding: 1rem 1.5rem 4rem; }
      .gallery-grid { grid-template-columns: 1fr; }
      .lightbox-prev { left: 0.5rem; }
      .lightbox-next { right: 0.5rem; }
      footer { flex-direction: column; gap: 1rem; text-align: center; }
    }
  </style>
</head>
<body>

  <canvas id="starfield"></canvas>

  <nav>
    <a href="../index.html" class="nav-logo">Maclaskey<span>Photo</span></a>
    <ul class="nav-links">
      <li><a href="../gallery.html" class="active">Gallery</a></li>
      <li><a href="../index.html#about">About</a></li>
      <li><a href="/meridian.html">Meridian</a></li>
      <li><a href="/contact.html">Contact</a></li>
    </ul>
  </nav>

  <div class="breadcrumb">
    <a href="../index.html">Home</a>
    <span>›</span>
    <a href="../gallery.html">Gallery</a>
    <span>›</span>
    <span>Urban</span>
  </div>

  <div class="page-header">
    <p class="page-eyebrow">Category 05</p>
    <h1 class="page-title">Ur<em>ban</em></h1>
    <p class="page-sub">Architecture, street, and the geometry of built environments.</p>
    <p class="photo-count">Loading photos<span>...</span></p>
  </div>

  <section class="gallery-section">
    <div id="gallery-grid" class="gallery-grid">
      <div class="loading">Loading gallery...</div>
    </div>
  </section>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close">✕</button>
    <button class="lightbox-prev" id="lightbox-prev">‹</button>
    <button class="lightbox-next" id="lightbox-next">›</button>
    <div class="lightbox-inner">
      <img class="lightbox-img" id="lightbox-img" src="" alt="" />
      <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>
    <div class="lightbox-counter" id="lightbox-counter"></div>
  </div>

  <footer>
    <div class="footer-logo">Maclaskey<span>Photo</span></div>
    <div class="footer-copy">© 2026 Timothy Maclaskey &nbsp;·&nbsp; maclaskeyphoto.com</div>
  </footer>

  <script>
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function initStars() {
      stars = [];
      for (let i = 0; i < 180; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.2 + 0.2,
          o: Math.random() * 0.7 + 0.1,
          speed: Math.random() * 0.015 + 0.005,
          phase: Math.random() * Math.PI * 2
        });
      }
    }

    function drawStars(t) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        const opacity = s.o * (0.6 + 0.4 * Math.sin(t * s.speed + s.phase));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200,180,140,${opacity})`;
        ctx.fill();
      });
      requestAnimationFrame(drawStars);
    }

    resize();
    initStars();
    requestAnimationFrame(drawStars);
    window.addEventListener('resize', () => { resize(); initStars(); });

    let photos = [];
    let currentIndex = 0;

    async function loadGallery() {
      const grid = document.getElementById('gallery-grid');
      const countEl = document.querySelector('.photo-count');

      try {
        const res = await fetch('../images/gallery/Urban/photos.json');
        if (!res.ok) throw new Error('No photos.json found');
        photos = await res.json();

        if (photos.length === 0) {
          grid.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1">
              <div class="empty-state-icon">✦</div>
              <p>No photos yet — check back soon.</p>
            </div>`;
          countEl.innerHTML = `<span>0</span> photos`;
          return;
        }

        countEl.innerHTML = `<span>${photos.length}</span> photo${photos.length !== 1 ? 's' : ''}`;

        grid.innerHTML = photos.map((photo, i) => `
          <div class="gallery-item" data-index="${i}">
            <img
              src="../images/gallery/Urban/${photo.filename}"
              alt="${photo.caption || photo.filename}"
              loading="lazy"
            />
            <div class="gallery-item-overlay">
              <div class="gallery-item-icon">⊕</div>
            </div>
            ${photo.caption ? `<div class="gallery-item-caption">${photo.caption}</div>` : ''}
          </div>
        `).join('');

        document.querySelectorAll('.gallery-item').forEach(item => {
          item.addEventListener('click', () => openLightbox(parseInt(item.dataset.index)));
        });

      } catch (e) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <div class="empty-state-icon">✦</div>
            <p>Gallery coming soon.</p>
          </div>`;
        countEl.textContent = '';
      }
    }

    const lightbox    = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxCap = document.getElementById('lightbox-caption');
    const lightboxCtr = document.getElementById('lightbox-counter');

    function openLightbox(index) {
      currentIndex = index;
      updateLightbox();
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
    }

    function updateLightbox() {
      const photo = photos[currentIndex];
      lightboxImg.src = `../images/gallery/Urban/${photo.filename}`;
      lightboxImg.alt = photo.caption || photo.filename;
      lightboxCap.textContent = photo.caption || '';
      lightboxCtr.textContent = `${currentIndex + 1} / ${photos.length}`;
    }

    function prevPhoto() {
      currentIndex = (currentIndex - 1 + photos.length) % photos.length;
      updateLightbox();
    }

    function nextPhoto() {
      currentIndex = (currentIndex + 1) % photos.length;
      updateLightbox();
    }

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    document.getElementById('lightbox-prev').addEventListener('click', prevPhoto);
    document.getElementById('lightbox-next').addEventListener('click', nextPhoto);

    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') prevPhoto();
      if (e.key === 'ArrowRight') nextPhoto();
    });

    loadGallery();
  </script>

</body>
</html>
