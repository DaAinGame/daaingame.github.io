name: Generate Gallery Manifests

on:
  push:
    paths:
      - 'images/gallery/**'

jobs:
  generate-manifests:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate photos.json for each category (preserving captions)
        run: |
          python3 << 'EOF'
          import os
          import json

          GALLERY_DIR = "images/gallery"
          EXTENSIONS = {".jpg", ".jpeg", ".png", ".gif", ".webp"}

          for category in os.listdir(GALLERY_DIR):
            category_path = os.path.join(GALLERY_DIR, category)
            if not os.path.isdir(category_path):
              continue

            output_path = os.path.join(category_path, "photos.json")

            # Load existing captions so we don't lose them
            existing_captions = {}
            if os.path.exists(output_path):
              try:
                with open(output_path, "r") as f:
                  existing = json.load(f)
                  for entry in existing:
                    if entry.get("caption"):
                      existing_captions[entry["filename"]] = entry["caption"]
              except Exception:
                pass  # If malformed, start fresh

            # Scan for image files
            photos = []
            for filename in sorted(os.listdir(category_path)):
              ext = os.path.splitext(filename)[1].lower()
              if ext not in EXTENSIONS:
                continue
              photos.append({
                "filename": filename,
                "caption": existing_captions.get(filename, "")
              })

            with open(output_path, "w") as f:
              json.dump(photos, f, indent=2)

            print(f"  {category}: {len(photos)} photos, {len(existing_captions)} captions preserved")

          EOF

      - name: Commit and push manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/gallery/**/photos.json
          git diff --staged --quiet || git commit -m "Auto-update gallery manifests [skip ci]"
          git push
